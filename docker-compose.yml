version: '3.8'

services:
  web:
    container_name: aispace
    image: aispace
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    entrypoint: /app/entrypoint.sh
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery_worker:
    image: aispace
    build: .
    command: celery -A aispace worker --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis

  celery_beat:
    image: aispace
    build: .
    command: celery -A aispace beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis